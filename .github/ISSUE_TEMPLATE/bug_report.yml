name: Bug report
description: Report a reproducible problem with neovim-docker.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, keymaps, Docker state, and plugin config when relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Neovim version, Docker version, OS, plugin manager, and LazyVim version if used.
      value: |
        - Neovim:
        - Docker:
        - OS:
        - Plugin manager:
        - LazyVim:
    validations:
      required: true

