name: Live Docker Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke:
    name: Live Docker smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Neovim
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim lua5.1

      - name: Prepare Compose fixture
        run: |
          mkdir -p /tmp/neovim-docker-compose
          cat > /tmp/neovim-docker-compose/compose.yaml <<'YAML'
          services:
            alpine:
              image: alpine:3.20
              command: ["sh", "-c", "echo neovim-docker && sleep 30"]
          YAML
          docker compose -f /tmp/neovim-docker-compose/compose.yaml up -d

      - name: Run live smoke
        run: nvim --headless -u NONE --cmd 'set shadafile=NONE' -c 'set rtp+=.' -c 'luafile tests/live_smoke.lua' -c 'qa'

      - name: Clean up Compose fixture
        if: always()
        run: docker compose -f /tmp/neovim-docker-compose/compose.yaml down -v
